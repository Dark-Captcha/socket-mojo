context:
  version: "0.2.0"
  mojo_version: "=1.0.0b3.dev2026061706"

package:
  name: "socket"
  version: ${{ version }}

source:
  - git: https://github.com/Dark-Captcha/socket-mojo.git
    rev: PLACEHOLDER_SHA

build:
  number: 0
  script:
    - mkdir -p ${{ PREFIX }}/lib/mojo
    - mojo package socket -o ${{ PREFIX }}/lib/mojo/socket.mojopkg

requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
  run:
    - ${{ pin_compatible('mojo-compiler') }}

# No automated `tests:` block — the test suite requires external Python
# echo / DNS helper servers running on fixed ports (see tests/run_tests.mojo
# header). Running them inside the isolated rattler-build sandbox would need
# extra orchestration not warranted at v0.2.0; the build itself verifies the
# package compiles, and the source tree's `pixi run test` is the gate for
# behavior.

about:
  homepage: https://github.com/Dark-Captcha/socket-mojo
  license: Apache-2.0
  license_file: LICENSE
  summary: Linux-native sockets for Mojo — direct syscalls + io_uring, no libc
  repository: https://github.com/Dark-Captcha/socket-mojo

extra:
  maintainers:
    - Dark-Captcha
  project_name:
    - socket-mojo
